# ============================================================
#   DiscordAuth 設定ファイル
#   Discord連携によるMinecraft認証システム
#
#   このプラグインはNode.jsアプリ（Discord Bot + Webダッシュボード）
#   を内蔵しており、サーバー起動時に自動的に起動します。
# ============================================================

# -----------------------------------------------------------
#  Node.js アプリの設定
#  Discord BotとWebダッシュボードの起動を管理します
# -----------------------------------------------------------
node:
  # Node.jsアプリを自動起動するかどうか
  #   true  = プラグイン有効化時にNode.jsアプリを自動起動
  #   false = Node.jsアプリを起動しない（外部で管理する場合）
  enabled: true

# -----------------------------------------------------------
#  Discord 設定
#  Discord Developer Portalでアプリケーションを作成し、
#  以下の情報を設定してください。
#  https://discord.com/developers/applications
# -----------------------------------------------------------
discord:
  # Discord Botのトークン
  # Botタブ → 「Reset Token」でトークンを取得できます
  # ※ SERVER MEMBERS INTENT を必ず有効にしてください
  bot-token: "YOUR_BOT_TOKEN_HERE"

  # Discord OAuth2 クライアントID
  # OAuth2タブ → Client ID をコピー
  client-id: "YOUR_CLIENT_ID_HERE"

  # Discord OAuth2 クライアントシークレット
  # OAuth2タブ → Client Secret をコピー
  client-secret: "YOUR_CLIENT_SECRET_HERE"

  # DiscordサーバーID（必須）
  # プレイヤーはこのサーバーのメンバーである必要があります
  # Discordの開発者モードを有効にして、サーバーを右クリック→「IDをコピー」
  guild-id: "YOUR_DISCORD_GUILD_ID_HERE"

# -----------------------------------------------------------
#  Webダッシュボード設定
# -----------------------------------------------------------
web:
  # Webサーバーのポート番号
  port: 3000

  # WebサーバーのベースURL
  # 外部公開する場合は実際のURLに変更してください
  # Discord OAuth2のリダイレクトURLにも使用されます
  # ※ Discord Developer Portalの「Redirects」に
  #    「{base-url}/auth/discord/callback」を追加してください
  base-url: "http://localhost:3000"

  # セッションの秘密鍵（ランダムな文字列に変更してください）
  session-secret: "change-this-to-a-random-string"

# -----------------------------------------------------------
#  認証API設定
# -----------------------------------------------------------
api:
  # APIキー（Minecraft → Node.js間の認証用）
  # ランダムな文字列に変更してください
  key: "change-this-to-a-secure-random-key"

  # APIリクエストのタイムアウト時間（ミリ秒）
  # Node.jsアプリが同じマシンで動作している場合は低い値で問題ありません
  timeout: 5000

# -----------------------------------------------------------
#  認証失敗時の動作設定
# -----------------------------------------------------------
auth:
  # GeyserMC (Bedrock Edition) プレイヤーのプレフィックス
  # Bedrockプレイヤーのユーザー名がこのプレフィックスで始まる場合、
  # Mojang APIのチェックをスキップし、認証を許可します。
  # デフォルトは GeyserMC のデフォルトである「.」です。
  # 無効にする場合は空文字（""）にしてください。
  bedrock-prefix: "."

  # APIに接続できない場合のデフォルト動作
  #   true  = 接続失敗時にログインを許可する（フェイルオープン）
  #   false = 接続失敗時にログインを拒否する（フェイルクローズ）
  fail-open: true

  # キャッシュの有効期限（秒）
  # 認証結果を一時的に保存して、APIへのリクエスト数を減らします
  # デフォルト: 0（キャッシュ無効）
  #
  # ⚠️  注意: 0以外に設定した場合、連携前にログインを試みて
  #    拒否されたプレイヤーは、アカウントを連携した後も
  #    キャッシュが切れるまで（この秒数の間）ログインできません。
  #    例えば300に設定すると、連携後最大5分間待つ必要があります。
  #
  # キャッシュを使う場合は60〜300程度を推奨します。
  cache-duration: 0

# -----------------------------------------------------------
#  メッセージ設定
#  プレイヤーに表示するメッセージをカスタマイズできます
#  カラーコードは「&」を使用できます（例: &a = 緑色）
# -----------------------------------------------------------
messages:
  # 認証されていないプレイヤーへのキックメッセージ
  kick-not-linked: "&cDiscordアカウントが連携されていません。\n\n&fMinecraftサーバーに参加するには、\nDiscordアカウントとの連携が必要です。\n\n&aウェブサイトまたはDiscordボットで連携してください。"

  # API接続失敗時のキックメッセージ（fail-openがfalseの場合に使用）
  kick-api-error: "&c認証サーバーに接続できませんでした。\n\n&fしばらく待ってから再度お試しください。"

  # 認証チェック中のメッセージ（コンソールログ用）
  checking: "&7%player% の認証を確認中..."

  # 認証成功メッセージ（コンソールログ用）
  auth-success: "&a%player% の認証に成功しました（Discord: %discord%）"

  # 認証失敗メッセージ（コンソールログ用）
  auth-failed: "&c%player% は認証されていません"
